name: lavilas-npm-publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-platform-package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package: codex-linux-x64
            target_triple: x86_64-unknown-linux-musl
            artifact_name: npm-codex-linux-x64
            bin_path: codex-rs/target/x86_64-unknown-linux-musl/release/codex
            rust_target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            package: codex-linux-arm64
            target_triple: aarch64-unknown-linux-musl
            artifact_name: npm-codex-linux-arm64
            bin_path: codex-rs/target/aarch64-unknown-linux-musl/release/codex
            rust_target: aarch64-unknown-linux-musl
          - os: macos-15-intel
            package: codex-darwin-x64
            target_triple: x86_64-apple-darwin
            artifact_name: npm-codex-darwin-x64
            bin_path: codex-rs/target/x86_64-apple-darwin/release/codex
            rust_target: x86_64-apple-darwin
          - os: macos-14
            package: codex-darwin-arm64
            target_triple: aarch64-apple-darwin
            artifact_name: npm-codex-darwin-arm64
            bin_path: codex-rs/target/aarch64-apple-darwin/release/codex
            rust_target: aarch64-apple-darwin
          - os: windows-latest
            package: codex-win32-x64
            target_triple: x86_64-pc-windows-msvc
            artifact_name: npm-codex-win32-x64
            bin_path: codex-rs/target/x86_64-pc-windows-msvc/release/codex.exe
            rust_target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            package: codex-win32-arm64
            target_triple: aarch64-pc-windows-msvc
            artifact_name: npm-codex-win32-arm64
            bin_path: codex-rs/target/aarch64-pc-windows-msvc/release/codex.exe
            rust_target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Setup Rust
        if: runner.os != 'macOS'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          targets: ${{ matrix.rust_target }}

      - name: Use preinstalled Rust (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          rustc -V
          cargo -V
          rustup target list --installed

      - if: ${{ matrix.target_triple == 'x86_64-unknown-linux-musl' || matrix.target_triple == 'aarch64-unknown-linux-musl'}}
        name: Use hermetic Cargo home (musl)
        shell: bash
        run: |
          set -euo pipefail
          cargo_home="${GITHUB_WORKSPACE}/.cargo-home"
          mkdir -p "${cargo_home}/bin"
          echo "CARGO_HOME=${cargo_home}" >> "$GITHUB_ENV"
          echo "${cargo_home}/bin" >> "$GITHUB_PATH"
          : > "${cargo_home}/config.toml"

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Verify installed Rust targets (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          rustup target list --installed

      - name: Verify installed Rust targets (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: rustup target list --installed

      - if: ${{ matrix.target_triple == 'x86_64-unknown-linux-musl' || matrix.target_triple == 'aarch64-unknown-linux-musl'}}
        name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.14.0

      - if: ${{ matrix.target_triple == 'x86_64-unknown-linux-musl' || matrix.target_triple == 'aarch64-unknown-linux-musl'}}
        name: Install musl build tools
        env:
          DEBIAN_FRONTEND: noninteractive
          TARGET: ${{ matrix.target_triple }}
          APT_UPDATE_ARGS: -o Acquire::Retries=3
          APT_INSTALL_ARGS: --no-install-recommends
        shell: bash
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/install-musl-build-tools.sh"

      - if: ${{ matrix.target_triple == 'x86_64-unknown-linux-musl' || matrix.target_triple == 'aarch64-unknown-linux-musl'}}
        name: Configure rustc UBSan wrapper (musl host)
        shell: bash
        run: |
          set -euo pipefail
          ubsan=""
          if command -v ldconfig >/dev/null 2>&1; then
            ubsan="$(ldconfig -p | grep -m1 'libubsan\.so\.1' | sed -E 's/.*=> (.*)$/\1/')"
          fi
          wrapper_root="${RUNNER_TEMP:-/tmp}"
          wrapper="${wrapper_root}/rustc-ubsan-wrapper"
          cat > "${wrapper}" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          if [[ -n "${ubsan}" ]]; then
            export LD_PRELOAD="${ubsan}\${LD_PRELOAD:+:\${LD_PRELOAD}}"
          fi
          exec "\$1" "\${@:2}"
          EOF
          chmod +x "${wrapper}"
          echo "RUSTC_WRAPPER=${wrapper}" >> "$GITHUB_ENV"
          echo "RUSTC_WORKSPACE_WRAPPER=" >> "$GITHUB_ENV"

      - if: ${{ matrix.target_triple == 'x86_64-unknown-linux-musl' || matrix.target_triple == 'aarch64-unknown-linux-musl'}}
        name: Clear sanitizer flags (musl)
        shell: bash
        run: |
          set -euo pipefail
          echo "AWS_LC_SYS_NO_JITTER_ENTROPY=1" >> "$GITHUB_ENV"
          target_no_jitter="AWS_LC_SYS_NO_JITTER_ENTROPY_${{ matrix.target_triple }}"
          target_no_jitter="${target_no_jitter//-/_}"
          echo "${target_no_jitter}=1" >> "$GITHUB_ENV"
          echo "RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_ENCODED_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "RUSTDOCFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_BUILD_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=" >> "$GITHUB_ENV"

          sanitize_flags() {
            local input="$1"
            input="${input//-fsanitize=undefined/}"
            input="${input//-fno-sanitize-recover=undefined/}"
            input="${input//-fno-sanitize-trap=undefined/}"
            echo "$input"
          }

          cflags="$(sanitize_flags "${CFLAGS-}")"
          cxxflags="$(sanitize_flags "${CXXFLAGS-}")"
          echo "CFLAGS=${cflags}" >> "$GITHUB_ENV"
          echo "CXXFLAGS=${cxxflags}" >> "$GITHUB_ENV"

      - if: ${{ matrix.target_triple == 'x86_64-unknown-linux-musl' || matrix.target_triple == 'aarch64-unknown-linux-musl' }}
        name: Configure musl rusty_v8 artifact overrides
        env:
          TARGET: ${{ matrix.target_triple }}
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 "${GITHUB_WORKSPACE}/.github/scripts/rusty_v8_bazel.py" resolved-v8-crate-version)"
          release_tag="rusty-v8-v${version}"
          base_url="https://github.com/openai/codex/releases/download/${release_tag}"
          archive="${base_url}/librusty_v8_release_${TARGET}.a.gz"
          binding_dir="${RUNNER_TEMP}/rusty_v8"
          binding_path="${binding_dir}/src_binding_release_${TARGET}.rs"
          mkdir -p "${binding_dir}"
          curl -fsSL "${base_url}/src_binding_release_${TARGET}.rs" -o "${binding_path}"
          echo "RUSTY_V8_ARCHIVE=${archive}" >> "$GITHUB_ENV"
          echo "RUSTY_V8_SRC_BINDING_PATH=${binding_path}" >> "$GITHUB_ENV"

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v=$(node -p "require('./codex-cli/package.json').version")
          fi
          echo "release_version=$v" >> "$GITHUB_OUTPUT"
          echo "Release version: $v"

      - if: ${{ matrix.target_triple == 'aarch64-unknown-linux-musl' }}
        name: Reduce arm64 musl linker memory pressure
        shell: bash
        run: |
          set -euo pipefail
          echo "CARGO_BUILD_JOBS=1" >> "$GITHUB_ENV"
          echo "CARGO_PROFILE_RELEASE_LTO=thin" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=-C link-arg=-Wl,--no-keep-memory" >> "$GITHUB_ENV"

      - name: Build Codex binary (unix)
        if: runner.os != 'Windows'
        working-directory: codex-rs
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p codex-cli --release --target "${{ matrix.rust_target }}"

      - name: Build Codex binary (windows)
        if: runner.os == 'Windows'
        working-directory: codex-rs
        shell: pwsh
        run: |
          cargo build -p codex-cli --release --target "${{ matrix.rust_target }}"

      - name: Prepare vendor root and fetch ripgrep (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VENDOR_ROOT="$RUNNER_TEMP/lavilas-vendor"
          rm -rf "$VENDOR_ROOT"
          mkdir -p "$VENDOR_ROOT/vendor"
          python3 .github/scripts/fetch_ripgrep_for_target.py \
            --vendor-dir "$VENDOR_ROOT/vendor" \
            --target "${{ matrix.target_triple }}"
          echo "VENDOR_ROOT=$VENDOR_ROOT" >> "$GITHUB_ENV"

      - name: Prepare vendor root and fetch ripgrep (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vendorRoot = Join-Path $env:RUNNER_TEMP 'lavilas-vendor'
          Remove-Item -Recurse -Force $vendorRoot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path (Join-Path $vendorRoot 'vendor') | Out-Null
          python .github/scripts/fetch_ripgrep_for_target.py `
            --vendor-dir (Join-Path $vendorRoot 'vendor') `
            --target '${{ matrix.target_triple }}'
          "VENDOR_ROOT=$vendorRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Stage npm package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_VERSION='${{ steps.version.outputs.release_version }}'
          mkdir -p "$VENDOR_ROOT/vendor/${{ matrix.target_triple }}/codex"

          cp "codex-rs/target/${{ matrix.rust_target }}/release/codex" "$VENDOR_ROOT/vendor/${{ matrix.target_triple }}/codex/codex"

          python3 codex-cli/scripts/build_npm_package.py \
            --package "${{ matrix.package }}" \
            --release-version "$RELEASE_VERSION" \
            --staging-dir "$RUNNER_TEMP/pkg-${{ matrix.package }}" \
            --vendor-src "$VENDOR_ROOT/vendor"

      - name: Stage npm package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $releaseVersion = '${{ steps.version.outputs.release_version }}'
          $vendorRoot = $env:VENDOR_ROOT
          New-Item -ItemType Directory -Force -Path (Join-Path $vendorRoot 'vendor/${{ matrix.target_triple }}/codex') | Out-Null

          Copy-Item "codex-rs/target/${{ matrix.rust_target }}/release/codex.exe" (Join-Path $vendorRoot 'vendor/${{ matrix.target_triple }}/codex/codex.exe')

          python codex-cli/scripts/build_npm_package.py `
            --package '${{ matrix.package }}' `
            --release-version $releaseVersion `
            --staging-dir (Join-Path $env:RUNNER_TEMP 'pkg-${{ matrix.package }}') `
            --vendor-src (Join-Path $vendorRoot 'vendor')

      - name: Upload staged npm package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ runner.temp }}/pkg-${{ matrix.package }}

  publish-npm:
    needs: build-platform-package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v=$(node -p "require('./codex-cli/package.json').version")
          fi
          echo "release_version=$v" >> "$GITHUB_OUTPUT"
          echo "Release version: $v"

      - name: Download staged platform packages
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/npm-artifacts

      - name: Restore executable bits in staged unix platform packages
        shell: bash
        run: |
          set -euo pipefail
          find "$RUNNER_TEMP/npm-artifacts" -type f \
            \( -path '*/vendor/*/codex/codex' -o -path '*/vendor/*/path/*' \) \
            -exec chmod 755 {} +

      - name: Stage base npm package
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_VERSION='${{ steps.version.outputs.release_version }}'
          python3 codex-cli/scripts/build_npm_package.py \
            --package codex \
            --release-version "$RELEASE_VERSION" \
            --staging-dir "$RUNNER_TEMP/pkg-codex"

      - name: Publish platform packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          publish_if_needed() {
            local dir="$1"
            local pkg_json name version
            pkg_json="$dir/package.json"
            name="$(node -p "require(process.argv[1]).name" "$pkg_json")"
            version="$(node -p "require(process.argv[1]).version" "$pkg_json")"

            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "Skipping ${name}@${version}: already published"
              return 0
            fi

            (cd "$dir" && npm publish --access public)
          }

          for dir in "$RUNNER_TEMP"/npm-artifacts/*; do
            if [[ -d "$dir" ]]; then
              publish_if_needed "$dir"
            fi
          done

      - name: Wait for platform packages to propagate on npm
        shell: bash
        run: |
          set -euo pipefail
          refs=()
          for dir in "$RUNNER_TEMP"/npm-artifacts/*; do
            [[ -d "$dir" ]] || continue
            pkg_json="$dir/package.json"
            name="$(node -p "require(process.argv[1]).name" "$pkg_json")"
            version="$(node -p "require(process.argv[1]).version" "$pkg_json")"
            refs+=("${name}@${version}")
          done

          if [[ ${#refs[@]} -eq 0 ]]; then
            echo "No staged platform packages found" >&2
            exit 1
          fi

          bash .github/scripts/wait_for_npm_package.sh --timeout 900 "${refs[@]}"

      - name: Smoke test propagated linux x64 platform package tarball
        shell: bash
        run: |
          set -euo pipefail
          work="$RUNNER_TEMP/npm-platform-smoke"
          rm -rf "$work"
          mkdir -p "$work/unpack"
          (cd "$work" && npm pack "@lavilas/codex-linux-x64@${{ steps.version.outputs.release_version }}" --silent >/dev/null)
          tarball="$(echo "$work"/*.tgz)"
          tar -xzf "$tarball" -C "$work/unpack"
          "$work/unpack/package/vendor/x86_64-unknown-linux-musl/codex/codex" --version

      - name: Smoke test staged base package against propagated platform packages (linux x64)
        shell: bash
        run: |
          set -euo pipefail
          prefix="$RUNNER_TEMP/npm-smoke-staged"
          rm -rf "$prefix"
          tarball_name="$(cd "$RUNNER_TEMP/pkg-codex" && npm pack --pack-destination "$RUNNER_TEMP" --silent | tail -n1)"
          npm install -g --prefix "$prefix" "$RUNNER_TEMP/$tarball_name"
          node -e \
            "require.resolve('@lavilas/codex-linux-x64/package.json', { paths: [process.argv[1]] })" \
            "$prefix/lib/node_modules/@lavilas/codex"
          "$prefix/bin/lavilas" --version
          test ! -e "$prefix/bin/codex"
          pkg_root="$prefix/lib/node_modules/@lavilas/codex"
          platform_root="$pkg_root/node_modules/@lavilas/codex-linux-x64"
          rm -f "$platform_root/package.json"
          "$prefix/bin/lavilas" --version
          test ! -e "$prefix/bin/codex"
          backup_root="$prefix/lib/node_modules/@lavilas/.codex-fallback"
          rm -rf "$backup_root"
          cp -a "$pkg_root" "$backup_root"
          truncate -s 1024 "$platform_root/vendor/x86_64-unknown-linux-musl/codex/codex"
          "$prefix/bin/lavilas" --version
          test ! -e "$prefix/bin/codex"

      - name: Publish base package
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          publish_if_needed() {
            local dir="$1"
            local pkg_json name version
            pkg_json="$dir/package.json"
            name="$(node -p "require(process.argv[1]).name" "$pkg_json")"
            version="$(node -p "require(process.argv[1]).version" "$pkg_json")"

            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "Skipping ${name}@${version}: already published"
              return 0
            fi

            (cd "$dir" && npm publish --access public)
          }

          publish_if_needed "$RUNNER_TEMP/pkg-codex"

      - name: Wait for base package to propagate on npm
        shell: bash
        run: |
          set -euo pipefail
          bash .github/scripts/wait_for_npm_package.sh --timeout 900 "@lavilas/codex@${{ steps.version.outputs.release_version }}"

      - name: Smoke test npm install (linux x64)
        shell: bash
        run: |
          set -euo pipefail
          prefix="$RUNNER_TEMP/npm-smoke"
          rm -rf "$prefix"
          npm install -g --prefix "$prefix" "@lavilas/codex@${{ steps.version.outputs.release_version }}"
          "$prefix/bin/lavilas" --version
          test ! -e "$prefix/bin/codex"
