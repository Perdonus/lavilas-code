name: lavilas-npm-publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y pkg-config libcap-dev

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v=$(node -p "require('./codex-cli/package.json').version")
          fi
          echo "release_version=$v" >> "$GITHUB_OUTPUT"
          echo "Release version: $v"

      - name: Build Linux Codex binary
        id: build_linux
        working-directory: codex-rs
        shell: bash
        run: |
          set -euo pipefail
          if ! cargo build -p codex-cli --release > /tmp/lavilas-cargo-build.log 2>&1; then
            echo "::error::cargo build failed; first lines from log below"
            sed -n '1,120p' /tmp/lavilas-cargo-build.log | while IFS= read -r line; do
              echo "::error::$line"
            done
            exit 1
          fi

      - name: Upload cargo build log artifact
        if: failure() && steps.build_linux.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: cargo-build-log-${{ github.run_id }}
          path: /tmp/lavilas-cargo-build.log
          if-no-files-found: warn

      - name: Stage npm packages
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_VERSION='${{ steps.version.outputs.release_version }}'
          VENDOR_ROOT="$RUNNER_TEMP/lavilas-vendor"
          rm -rf "$VENDOR_ROOT"
          mkdir -p "$VENDOR_ROOT/vendor/x86_64-unknown-linux-musl/codex"
          mkdir -p "$VENDOR_ROOT/vendor/x86_64-unknown-linux-musl/path"

          cp codex-rs/target/release/codex "$VENDOR_ROOT/vendor/x86_64-unknown-linux-musl/codex/codex"
          cp "$(command -v rg)" "$VENDOR_ROOT/vendor/x86_64-unknown-linux-musl/path/rg"

          python3 codex-cli/scripts/build_npm_package.py \
            --package codex-linux-x64 \
            --release-version "$RELEASE_VERSION" \
            --staging-dir "$RUNNER_TEMP/pkg-codex-linux-x64" \
            --vendor-src "$VENDOR_ROOT/vendor"

          python3 codex-cli/scripts/build_npm_package.py \
            --package codex \
            --release-version "$RELEASE_VERSION" \
            --staging-dir "$RUNNER_TEMP/pkg-codex"

      - name: Publish platform package (@lavilas/codex@<version>-linux-x64)
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/pkg-codex-linux-x64"
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish base package (@lavilas/codex@<version>)
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/pkg-codex"
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
