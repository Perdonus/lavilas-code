name: lavilas-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: lavilas-codex-linux-x64
            bin_path: codex-rs/target/x86_64-unknown-linux-musl/release/codex
            install_build_deps: sudo apt-get update && sudo apt-get install -y pkg-config libcap-dev musl-tools
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            artifact_name: lavilas-codex-linux-arm64
            bin_path: codex-rs/target/aarch64-unknown-linux-musl/release/codex
            install_build_deps: sudo apt-get update && sudo apt-get install -y pkg-config libcap-dev musl-tools
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact_name: lavilas-codex-macos-x64
            bin_path: codex-rs/target/x86_64-apple-darwin/release/codex
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: lavilas-codex-macos-arm64
            bin_path: codex-rs/target/aarch64-apple-darwin/release/codex
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: lavilas-codex-windows-x64.exe
            bin_path: codex-rs/target/x86_64-pc-windows-msvc/release/codex.exe
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact_name: lavilas-codex-windows-arm64.exe
            bin_path: codex-rs/target/aarch64-pc-windows-msvc/release/codex.exe

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Rust target standard library
        run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install platform build dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          ${{ matrix.install_build_deps }}

      - name: Build release binary (unix)
        if: runner.os != 'Windows'
        run: cargo build -p codex-cli --release --target ${{ matrix.target }}

      - name: Build release binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo build -p codex-cli --release --target ${{ matrix.target }}

      - name: Stage artifact (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p ../dist
          cp ../${{ matrix.bin_path }} ../dist/${{ matrix.artifact_name }}

      - name: Stage artifact (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ..\dist | Out-Null
          Copy-Item ..\${{ matrix.bin_path }} ..\dist\${{ matrix.artifact_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/lavilas-codex-linux-x64
            artifacts/**/lavilas-codex-linux-arm64
            artifacts/**/lavilas-codex-macos-x64
            artifacts/**/lavilas-codex-macos-arm64
            artifacts/**/lavilas-codex-windows-x64.exe
            artifacts/**/lavilas-codex-windows-arm64.exe
