name: lavilas-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: lavilas-codex-linux-x64
            bin_path: codex-rs/target/release/codex
          - os: macos-latest
            artifact_name: lavilas-codex-macos-arm64
            bin_path: codex-rs/target/release/codex
          - os: windows-latest
            artifact_name: lavilas-codex-windows-x64.exe
            bin_path: codex-rs/target/release/codex.exe

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build -p codex-cli --release

      - name: Stage artifact (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p ../dist
          cp "${{ matrix.bin_path }}" "../dist/${{ matrix.artifact_name }}"

      - name: Stage artifact (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ..\\dist | Out-Null
          Copy-Item "${{ matrix.bin_path }}" "..\\dist\\${{ matrix.artifact_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/lavilas-codex-linux-x64
            artifacts/**/lavilas-codex-macos-arm64
            artifacts/**/lavilas-codex-windows-x64.exe
