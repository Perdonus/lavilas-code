name: lavilas-ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate fork version file
        run: |
          test -f VERSION
          grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' VERSION
      - name: Show versions
        run: |
          echo "Fork version: $(cat VERSION)"
          node --version
          npm --version

  rust-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux bwrap build dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cargo fmt check
        run: cargo fmt --check
      - name: Cargo check cli+tui
        run: |
          cargo check -p codex-cli
          cargo check -p codex-tui

  npm-metadata-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codex-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate npm package identity
        run: |
          node -e "const p=require('./package.json'); if(p.name!=='@lavilas/codex') { throw new Error('package name mismatch: '+p.name) } ; if(!/^\d+\.\d+\.\d+/.test(p.version)){ throw new Error('invalid version '+p.version)}; const bins=Object.keys(p.bin||{}); if(bins.length!==1 || bins[0]!=='lavilas' || p.bin.lavilas!=='bin/codex.js'){ throw new Error('expected only lavilas bin, got '+JSON.stringify(p.bin)) }; console.log('ok', p.name, p.version, bins.join(','))"
