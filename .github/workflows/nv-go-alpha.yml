name: go-lavilas-alpha

on:
  push:
    branches:
      - nv-go-alpha
  workflow_dispatch:
    inputs:
      version:
        description: Full release version override
        required: false
        type: string
      publish:
        description: Publish this build to the alpha channel
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: go-lavilas-alpha-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: '1.24.2'
  NV_SERVER_URL: https://sosiskibot.ru/nv/api
  RELEASE_CHANNEL: alpha
  PACKAGE_ID: lvls
  PACKAGE_TITLE: Go Lavilas Alpha
  PACKAGE_BINARY: lvls

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      publish_enabled: ${{ steps.meta.outputs.publish_enabled }}
    steps:
      - id: meta
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_PUBLISH: ${{ github.event.inputs.publish }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          version="${INPUT_VERSION}"
          if [ -z "$version" ]; then
            version="0.1.0-alpha.${GITHUB_RUN_NUMBER}"
          fi

          publish_enabled=false
          if [ "$EVENT_NAME" = "push" ] || [ "$INPUT_PUBLISH" = "true" ]; then
            publish_enabled=true
          fi

          {
            echo "version=$version"
            echo "publish_enabled=$publish_enabled"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Build alpha artifacts
        env:
          GO_LAVILAS_PRODUCT_SLUG: ${{ env.PACKAGE_ID }}
          GO_LAVILAS_PRODUCT_TITLE: ${{ env.PACKAGE_TITLE }}
          GO_LAVILAS_BINARY_NAME: ${{ env.PACKAGE_BINARY }}
          GO_LAVILAS_CHANNEL: ${{ env.RELEASE_CHANNEL }}
          LAVILAS_VERSION: ${{ needs.prepare.outputs.version }}
          LAVILAS_COMMIT: ${{ github.sha }}
          LAVILAS_GIT_REF: ${{ github.ref_name }}
          LAVILAS_REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
          LAVILAS_WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: ./scripts/build-release.sh

      - name: Publish build summary
        run: |
          {
            echo "## LVLS alpha build"
            echo
            printf -- '- Package: `%s`\n' "${PACKAGE_ID}"
            printf -- '- Binary: `%s`\n' "${PACKAGE_BINARY}"
            printf -- '- Version: `%s`\n' "${{ needs.prepare.outputs.version }}"
            printf -- '- Channel: `%s`\n' "${RELEASE_CHANNEL}"
            printf -- '- Commit: `%s`\n' "${GITHUB_SHA}"
            echo
            echo "### Checksums"
            echo '```text'
            cat dist/SHA256SUMS
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_ID }}-alpha-dist-${{ needs.prepare.outputs.version }}
          path: dist/
          if-no-files-found: error
          retention-days: 14

  publish-nv:
    needs:
      - prepare
      - build
    if: ${{ needs.prepare.outputs.publish_enabled == 'true' }}
    runs-on: ubuntu-latest
    env:
      NV_PUBLISH_TOKEN: ${{ secrets.NV_PUBLISH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PACKAGE_ID }}-alpha-dist-${{ needs.prepare.outputs.version }}
          path: dist/

      - name: Prepare publish manifest
        env:
          LAVILAS_VERSION: ${{ needs.prepare.outputs.version }}
        run: ./scripts/prepare-nv-manifest.sh

      - name: Install NV CLI
        run: curl -fsSL https://sosiskibot.ru/install/nv.sh | sh

      - name: Skip publish without NV token
        if: ${{ env.NV_PUBLISH_TOKEN == '' }}
        run: echo "NV_PUBLISH_TOKEN is not configured. Skipping publish." >> "$GITHUB_STEP_SUMMARY"

      - name: Publish alpha to NV
        if: ${{ env.NV_PUBLISH_TOKEN != '' }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          nv publish --manifest ./dist/nv.package.publish.json --tag "${RELEASE_CHANNEL}" --server "${NV_SERVER_URL}"
